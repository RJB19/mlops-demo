apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-model
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-model
  template:
    metadata:
      labels:
        app: fraud-model
    spec:
      containers:
      - name: fraud-model
        image: fraud-model:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000 